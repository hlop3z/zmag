# Server Config
# options: development, staging, production
mode = "development"
debug = true
version = "0.4.0"
description = "API for managing items, including creation, retrieval, updates, and deletion."

# Installed Apps by Mode
[spoc.apps]
production = ["sample", "blogs"]
